name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run build
        run: npm run build
      
      - name: Check for TypeScript errors
        run: npx tsc --noEmit || true
      
      - name: Verify build artifacts
        run: |
          if [ ! -d "web-dist" ]; then
            echo "Build failed: web-dist directory not found"
            exit 1
          fi
          echo "Build successful: web-dist directory exists"
